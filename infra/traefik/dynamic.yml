# Traefik Dynamic Configuration — EMS-COP Routes
# Maps API prefixes to backend services via Docker internal DNS
# Public routes (no auth) use higher priority to match before protected catch-all

http:
  # ════════════════════════════════════════════
  #  MIDDLEWARES
  # ════════════════════════════════════════════
  middlewares:
    auth-verify:
      forwardAuth:
        address: "http://auth-service:3001/api/v1/auth/verify"
        authResponseHeaders:
          - "X-User-ID"
          - "X-User-Roles"
          - "X-Session-ID"

    cors-headers:
      headers:
        # NOTE: Traefik file provider does not support env var interpolation.
        # For Docker dev, this is hardcoded. For Kubernetes, use the Helm chart's
        # global.allowedOrigins value which is passed to each service's ALLOWED_ORIGINS env var.
        accessControlAllowOriginList:
          - "http://localhost"
          - "https://localhost"
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "PATCH"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "Authorization"
          - "Content-Type"
        accessControlMaxAge: 86400

    security-headers:
      headers:
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          Referrer-Policy: "strict-origin-when-cross-origin"
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self' data:; frame-ancestors 'none'"

  # ════════════════════════════════════════════
  #  ROUTERS — PUBLIC (no auth required)
  # ════════════════════════════════════════════
  routers:
    # Auth endpoints (login, refresh) — must be public
    auth-public:
      rule: "PathPrefix(`/api/v1/auth/login`) || PathPrefix(`/api/v1/auth/refresh`)"
      entryPoints: [web, websecure]
      service: auth
      middlewares: [cors-headers, security-headers]
      priority: 100
      tls: {}

    # C2 shell WebSocket — auth handled by c2-gateway via query param token
    c2-shell:
      rule: "PathRegexp(`/api/v1/c2/sessions/.+/shell`)"
      entryPoints: [web, websecure]
      service: c2
      middlewares: [cors-headers, security-headers]
      priority: 90
      tls: {}

    # C2 VNC WebSocket — auth handled by c2-gateway via query param token
    c2-vnc:
      rule: "PathPrefix(`/api/v1/c2/vnc`)"
      entryPoints: [web, websecure]
      service: c2
      middlewares: [cors-headers, security-headers]
      priority: 90
      tls: {}

    # Jira inbound webhook — auth via shared secret, not ForwardAuth
    jira-webhook:
      rule: "Path(`/api/v1/notifications/jira/webhook`)"
      entryPoints: [web, websecure]
      service: notification
      middlewares: [cors-headers, security-headers]
      priority: 90
      tls: {}

    # Frontend SPA — public
    frontend:
      rule: "PathPrefix(`/`)"
      entryPoints: [web, websecure]
      service: frontend
      middlewares: [security-headers]
      priority: 1
      tls: {}

  # ════════════════════════════════════════════
  #  ROUTERS — PROTECTED (auth-verify middleware)
  # ════════════════════════════════════════════
    auth:
      rule: "PathPrefix(`/api/v1/auth`)"
      entryPoints: [web, websecure]
      service: auth
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    workflow:
      rule: "PathPrefix(`/api/v1/workflows`)"
      entryPoints: [web, websecure]
      service: workflow
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    ticket:
      rule: "PathPrefix(`/api/v1/tickets`)"
      entryPoints: [web, websecure]
      service: ticket
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    commands:
      rule: "PathPrefix(`/api/v1/commands`)"
      entryPoints: [web, websecure]
      service: ticket
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    dashboard-api:
      rule: "PathPrefix(`/api/v1/dashboards`)"
      entryPoints: [web, websecure]
      service: dashboard-api
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    c2:
      rule: "PathPrefix(`/api/v1/c2`)"
      entryPoints: [web, websecure]
      service: c2
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    audit:
      rule: "PathPrefix(`/api/v1/audit`)"
      entryPoints: [web, websecure]
      service: audit
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    notification:
      rule: "PathPrefix(`/api/v1/notifications`)"
      entryPoints: [web, websecure]
      service: notification
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    workflow-runs:
      rule: "PathPrefix(`/api/v1/workflow-runs`)"
      entryPoints: [web, websecure]
      service: workflow
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    operations:
      rule: "PathPrefix(`/api/v1/operations`)"
      entryPoints: [web, websecure]
      service: workflow
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    networks:
      rule: "PathPrefix(`/api/v1/networks`)"
      entryPoints: [web, websecure]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    nodes:
      rule: "PathPrefix(`/api/v1/nodes`)"
      entryPoints: [web, websecure]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    edges:
      rule: "PathPrefix(`/api/v1/edges`)"
      entryPoints: [web, websecure]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    display-schemas:
      rule: "PathPrefix(`/api/v1/display-schemas`)"
      entryPoints: [web, websecure]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    import-parsers:
      rule: "PathPrefix(`/api/v1/import-parsers`)"
      entryPoints: [web, websecure]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    findings:
      rule: "PathPrefix(`/api/v1/findings`)"
      entryPoints: [web, websecure]
      service: ticket
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    endpoint:
      rule: "PathPrefix(`/api/v1/endpoints`)"
      entryPoints: [web, websecure]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50
      tls: {}

    # ── M13 DCO/SOC Routes ──
    endpoint-alerts:
      rule: "PathPrefix(`/api/v1/endpoints/alerts`)"
      entryPoints: [web, websecure]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55
      tls: {}

    endpoint-iocs:
      rule: "PathPrefix(`/api/v1/endpoints/iocs`)"
      entryPoints: [web, websecure]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55
      tls: {}

    c2-containment:
      rule: "PathPrefix(`/api/v1/c2/containment`)"
      entryPoints: [web, websecure]
      service: c2
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55
      tls: {}

    workflow-playbooks:
      rule: "PathPrefix(`/api/v1/workflows/playbooks`)"
      entryPoints: [web, websecure]
      service: workflow
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55
      tls: {}

    workflow-playbook-executions:
      rule: "PathPrefix(`/api/v1/workflows/playbook-executions`)"
      entryPoints: [web, websecure]
      service: workflow
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55
      tls: {}

    ticket-incidents:
      rule: "PathPrefix(`/api/v1/tickets/incidents`)"
      entryPoints: [web, websecure]
      service: ticket
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55
      tls: {}

    # WebSocket relay — auth handled by ws-relay via handshake token
    ws:
      rule: "PathPrefix(`/ws`)"
      entryPoints: [web, websecure]
      service: ws
      middlewares: [cors-headers, security-headers]
      priority: 80
      tls: {}

  # ════════════════════════════════════════════
  #  SERVICES (backend targets)
  # ════════════════════════════════════════════
  services:
    auth:
      loadBalancer:
        servers:
          - url: "http://auth-service:3001"
    workflow:
      loadBalancer:
        servers:
          - url: "http://workflow-engine:3002"
    ticket:
      loadBalancer:
        servers:
          - url: "http://ticket-service:3003"
    dashboard-api:
      loadBalancer:
        servers:
          - url: "http://dashboard-service:3004"
    c2:
      loadBalancer:
        servers:
          - url: "http://c2-gateway:3005"
    audit:
      loadBalancer:
        servers:
          - url: "http://audit-service:3006"
    notification:
      loadBalancer:
        servers:
          - url: "http://notification-service:3007"
    endpoint:
      loadBalancer:
        servers:
          - url: "http://endpoint-service:3008"
    ws:
      loadBalancer:
        servers:
          - url: "http://ws-relay:3009"
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:80"
