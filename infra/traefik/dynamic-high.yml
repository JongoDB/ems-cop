# Traefik Dynamic Configuration — High-Side Enclave Routes
# Service names use -high suffix matching docker-compose.high.yml container DNS names
# No C2 shell/VNC routes on high side (no direct endpoint access)

http:
  # ════════════════════════════════════════════
  #  MIDDLEWARES
  # ════════════════════════════════════════════
  middlewares:
    auth-verify:
      forwardAuth:
        address: "http://auth-service-high:3001/api/v1/auth/verify"
        authResponseHeaders:
          - "X-User-ID"
          - "X-User-Roles"
          - "X-Session-ID"

    cors-headers:
      headers:
        accessControlAllowOriginList:
          - "http://localhost:28080"
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "PATCH"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "Authorization"
          - "Content-Type"
        accessControlMaxAge: 86400

    security-headers:
      headers:
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          Referrer-Policy: "strict-origin-when-cross-origin"
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none'"

  # ════════════════════════════════════════════
  #  ROUTERS — PUBLIC (no auth required)
  # ════════════════════════════════════════════
  routers:
    auth-public:
      rule: "PathPrefix(`/api/v1/auth/login`) || PathPrefix(`/api/v1/auth/refresh`)"
      entryPoints: [web]
      service: auth
      middlewares: [cors-headers, security-headers]
      priority: 100

    jira-webhook:
      rule: "Path(`/api/v1/notifications/jira/webhook`)"
      entryPoints: [web]
      service: notification
      middlewares: [cors-headers, security-headers]
      priority: 90

    frontend:
      rule: "PathPrefix(`/`)"
      entryPoints: [web]
      service: frontend
      middlewares: [security-headers]
      priority: 1

  # ════════════════════════════════════════════
  #  ROUTERS — PROTECTED (auth-verify middleware)
  # ════════════════════════════════════════════
    auth:
      rule: "PathPrefix(`/api/v1/auth`)"
      entryPoints: [web]
      service: auth
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    workflow:
      rule: "PathPrefix(`/api/v1/workflows`)"
      entryPoints: [web]
      service: workflow
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    ticket:
      rule: "PathPrefix(`/api/v1/tickets`)"
      entryPoints: [web]
      service: ticket
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    commands:
      rule: "PathPrefix(`/api/v1/commands`)"
      entryPoints: [web]
      service: ticket
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    dashboard-api:
      rule: "PathPrefix(`/api/v1/dashboards`)"
      entryPoints: [web]
      service: dashboard-api
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    c2:
      rule: "PathPrefix(`/api/v1/c2`)"
      entryPoints: [web]
      service: c2
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    audit:
      rule: "PathPrefix(`/api/v1/audit`)"
      entryPoints: [web]
      service: audit
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    notification:
      rule: "PathPrefix(`/api/v1/notifications`)"
      entryPoints: [web]
      service: notification
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    workflow-runs:
      rule: "PathPrefix(`/api/v1/workflow-runs`)"
      entryPoints: [web]
      service: workflow
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    operations:
      rule: "PathPrefix(`/api/v1/operations`)"
      entryPoints: [web]
      service: workflow
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    networks:
      rule: "PathPrefix(`/api/v1/networks`)"
      entryPoints: [web]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    nodes:
      rule: "PathPrefix(`/api/v1/nodes`)"
      entryPoints: [web]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    edges:
      rule: "PathPrefix(`/api/v1/edges`)"
      entryPoints: [web]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    display-schemas:
      rule: "PathPrefix(`/api/v1/display-schemas`)"
      entryPoints: [web]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    import-parsers:
      rule: "PathPrefix(`/api/v1/import-parsers`)"
      entryPoints: [web]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    findings:
      rule: "PathPrefix(`/api/v1/findings`)"
      entryPoints: [web]
      service: ticket
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    endpoint:
      rule: "PathPrefix(`/api/v1/endpoints`)"
      entryPoints: [web]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    # ── M13 DCO/SOC Routes ──
    endpoint-alerts:
      rule: "PathPrefix(`/api/v1/endpoints/alerts`)"
      entryPoints: [web]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55

    endpoint-iocs:
      rule: "PathPrefix(`/api/v1/endpoints/iocs`)"
      entryPoints: [web]
      service: endpoint
      middlewares: [auth-verify, cors-headers, security-headers]
