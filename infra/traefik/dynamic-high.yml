    c2-containment:
      rule: "PathPrefix(`/api/v1/c2/containment`)"
      entryPoints: [web]
      service: c2
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55

    workflow-playbooks:
      rule: "PathPrefix(`/api/v1/workflows/playbooks`)"
      entryPoints: [web]
      service: workflow
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55

    workflow-playbook-executions:
      rule: "PathPrefix(`/api/v1/workflows/playbook-executions`)"
      entryPoints: [web]
      service: workflow
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55

    ticket-incidents:
      rule: "PathPrefix(`/api/v1/tickets/incidents`)"
      entryPoints: [web]
      service: ticket
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 55

    cti-relay:
      rule: "PathPrefix(`/api/v1/cti`)"
      entryPoints: [web]
      service: cti-relay
      middlewares: [auth-verify, cors-headers, security-headers]
      priority: 50

    ws:
      rule: "PathPrefix(`/ws`)"
      entryPoints: [web]
      service: ws
      middlewares: [cors-headers, security-headers]
      priority: 80

  # ════════════════════════════════════════════
  #  SERVICES (backend targets — high-side)
  # ════════════════════════════════════════════
  services:
    auth:
      loadBalancer:
        servers:
          - url: "http://auth-service-high:3001"
    workflow:
      loadBalancer:
        servers:
          - url: "http://workflow-engine-high:3002"
    ticket:
      loadBalancer:
        servers:
          - url: "http://ticket-service-high:3003"
    dashboard-api:
      loadBalancer:
        servers:
          - url: "http://dashboard-service-high:3004"
    c2:
      loadBalancer:
        servers:
          - url: "http://c2-gateway-high:3005"
    audit:
      loadBalancer:
        servers:
          - url: "http://audit-service-high:3006"
    notification:
      loadBalancer:
        servers:
          - url: "http://notification-service-high:3007"
    endpoint:
      loadBalancer:
        servers:
          - url: "http://endpoint-service-high:3008"
    ws:
      loadBalancer:
        servers:
          - url: "http://ws-relay-high:3009"
    cti-relay:
      loadBalancer:
        servers:
          - url: "http://cti-relay:3010"
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend-high:80"
