{{- if .Values.networkPolicy.enabled }}
# ════════════════════════════════════════════════════════════════
#  NetworkPolicy — Per-service enclave isolation
#  Each service only accepts traffic from Traefik ingress + specific peers
# ════════════════════════════════════════════════════════════════

{{- $services := list "auth" "workflow-engine" "ticket" "dashboard" "c2-gateway" "audit" "notification" "endpoint" "ws-relay" "frontend" }}

{{- range $svc := $services }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $.Release.Name }}-{{ $svc }}
  labels:
    {{- include "ems-cop.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $svc }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ $svc }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Traefik ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: {{ index (dict "auth" 3001 "workflow-engine" 3002 "ticket" 3003 "dashboard" 3004 "c2-gateway" 3005 "audit" 3006 "notification" 3007 "endpoint" 3008 "ws-relay" 3009 "frontend" 80) $svc }}
    # Allow traffic from other EMS services (same namespace)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: ems-cop
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow traffic to infrastructure services
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432   # PostgreSQL
        - protocol: TCP
          port: 6379   # Redis
        - protocol: TCP
          port: 4222   # NATS
        - protocol: TCP
          port: 8123   # ClickHouse HTTP
        - protocol: TCP
          port: 9000   # MinIO / ClickHouse native
    # Allow traffic to other EMS services
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: ems-cop
{{- end }}

# ════════════════════════════════════════════════════════════════
#  endpoint-net isolation: only c2-gateway can reach endpoint network
# ════════════════════════════════════════════════════════════════
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-endpoint-net-isolation
  labels:
    {{- include "ems-cop.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      network-zone: endpoint
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: c2-gateway
              app.kubernetes.io/instance: {{ .Release.Name }}

# ════════════════════════════════════════════════════════════════
#  cti-net isolation: only cti-relay service
# ════════════════════════════════════════════════════════════════
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-cti-net-isolation
  labels:
    {{- include "ems-cop.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      network-zone: cti
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cti-relay
              app.kubernetes.io/instance: {{ .Release.Name }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cti-relay
              app.kubernetes.io/instance: {{ .Release.Name }}
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
