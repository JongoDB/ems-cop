{{- if .Values.serviceAccount.create }}
# ════════════════════════════════════════════════════════════════
#  ServiceAccounts — per-service with minimal permissions
# ════════════════════════════════════════════════════════════════

{{- $allServices := list "auth" "workflow-engine" "ticket" "dashboard" "c2-gateway" "audit" "notification" "endpoint" "ws-relay" "frontend" "cti-relay" }}

{{- range $svc := $allServices }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $.Release.Name }}-{{ $svc }}
  labels:
    {{- include "ems-cop.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $svc }}
  {{- with $.Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
