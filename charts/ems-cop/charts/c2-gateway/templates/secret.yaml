apiVersion: v1
kind: Secret
metadata:
  name: {{ include "c2-gateway.fullname" . }}-secrets
  labels: {{- include "c2-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.global.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.global.postgres.password | quote }}
  JWT_SECRET: {{ .Values.global.jwtSecret | quote }}
  MINIO_ACCESS_KEY: {{ .Values.global.minio.accessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.global.minio.secretKey | quote }}
