---
# EMS-COP Restore Playbook
# Restores data from a backup directory
# Usage:
#   ansible-playbook playbooks/restore.yml -e backup_path=/opt/ems-cop/backups/20260303T120000

- name: Restore EMS-COP data
  hosts: low_enclave:high_enclave
  tags: [restore]
  vars_prompt:
    - name: confirm_restore
      prompt: "WARNING: This will overwrite current data. Restore from {{ backup_path }}? (yes/no)"
      private: false
  pre_tasks:
    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Restore cancelled by user"
      when: confirm_restore != "yes"

    - name: Verify backup path exists
      ansible.builtin.stat:
        path: "{{ backup_path }}"
      register: backup_stat

    - name: Fail if backup not found
      ansible.builtin.fail:
        msg: "Backup path {{ backup_path }} does not exist"
      when: not backup_stat.stat.exists

  tasks:
    # ── Stop services before restore ──
    - name: Stop EMS services
      community.docker.docker_container:
        name: "ems-{{ item }}-{{ enclave }}"
        state: stopped
      loop:
        - auth
        - workflow
        - ticket
        - dashboard
        - c2-gateway
        - audit
        - notification
        - endpoint
        - ws-relay
        - frontend
      ignore_errors: true

    # ── PostgreSQL Restore ──
    - name: Check for PostgreSQL backup
      ansible.builtin.stat:
        path: "{{ backup_path }}/postgres_{{ enclave }}.dump"
      register: pg_backup

    - name: Restore PostgreSQL
      when: pg_backup.stat.exists
      block:
        - name: Copy backup to PostgreSQL container
          ansible.builtin.command:
            cmd: >
              docker cp {{ backup_path }}/postgres_{{ enclave }}.dump
              ems-postgres-{{ enclave }}:/tmp/restore.dump

        - name: Restore PostgreSQL from backup
          ansible.builtin.command:
            cmd: >
              docker exec ems-postgres-{{ enclave }}
              pg_restore -U {{ postgres_user }} -d {{ postgres_db }}
              --clean --if-exists /tmp/restore.dump
          changed_when: true

    # ── Redis Restore ──
    - name: Check for Redis backup
      ansible.builtin.stat:
        path: "{{ backup_path }}/redis_{{ enclave }}.rdb"
      register: redis_backup

    - name: Restore Redis
      when: redis_backup.stat.exists
      block:
        - name: Stop Redis container
          community.docker.docker_container:
            name: "ems-redis-{{ enclave }}"
            state: stopped

        - name: Copy RDB file to Redis data volume
          ansible.builtin.command:
            cmd: >
              cp {{ backup_path }}/redis_{{ enclave }}.rdb
              {{ ems_home }}/data/redis/dump.rdb
          changed_when: true

        - name: Start Redis container
          community.docker.docker_container:
            name: "ems-redis-{{ enclave }}"
            state: started

    # ── Restart all services ──
    - name: Start EMS services
      community.docker.docker_container:
        name: "ems-{{ item }}-{{ enclave }}"
        state: started
      loop:
        - auth
        - workflow
        - ticket
        - dashboard
        - c2-gateway
        - audit
        - notification
        - endpoint
        - ws-relay
        - frontend
      ignore_errors: true

    - name: Wait for services to recover
      ansible.builtin.pause:
        seconds: 30

    - name: Verify auth service health post-restore
      ansible.builtin.uri:
        url: "http://localhost:{{ traefik_http_port }}/api/v1/auth/health"
        method: GET
      register: auth_health
      retries: 10
      delay: 5
      until: auth_health.status == 200
